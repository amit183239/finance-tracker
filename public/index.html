<!doctype html><html><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Finance Tracker</title><link rel="stylesheet" href="/style.css"/></head><body><main class="container"><div class="topbar"><h1>💳 Finance Tracker</h1><label class="theme-picker">Theme <select id="themeMode" title="Theme mode"><option value="system">System</option><option value="light">Light</option><option value="dark">Dark</option></select></label></div><section class="stats"><div class="stat"><label>This Week</label><strong id="weeklySpend">₹0</strong></div><div class="stat"><label>This Month</label><strong id="monthlySpend">₹0</strong></div></section><section class="card"><h2>Cards</h2><div id="cardsGrid" class="cards-grid"></div></section><section id="cardDetail" class="card hidden"><h2 id="cardDetailTitle">Card Transactions</h2><div class="chip-row"><button id="cardCurrentBtn" class="chip active" type="button">Current Month</button><button id="cardPrevBtn" class="chip" type="button">Previous Month</button></div><ul id="cardTxnsList" class="list"></ul></section><section class="card"><h2>Recent Transactions</h2><form id="txnFilters" class="filters"><input type="month" name="month" title="Month"/><input type="date" name="start"/><input type="date" name="end"/><select name="type"><option value="">All</option><option value="debit">Debit</option><option value="credit">Credit</option></select><input type="text" name="q" placeholder="Search"/><button type="submit">Apply</button></form><ul id="txnsList" class="list"></ul></section></main><script src="/app.js" type="module"></script></body></html>
